<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Email Assistant</title>

    <link rel="stylesheet" href="popup.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="logo">✉️</div>

        <div>
            <h1>Email AI</h1>
            <p>Generate professional replies instantly</p>
        </div>
    </div>

    <!-- Incoming Email -->
    <label for="email">Incoming Email</label>

    <textarea
        id="email"
        placeholder="Paste email..."
    ></textarea>

    <!-- Tone -->
    <label for="tone">Tone</label>

    <select id="tone">
        <option>Professional</option>
        <option>Friendly</option>
        <option>Formal</option>
        <option>Empathetic</option>
        <option>Confident</option>
    </select>

    <!-- Reply Length -->
    <label for="length">Reply Length</label>

    <select id="length">
        <option value="short">Short</option>
        <option value="medium" selected>Medium</option>
        <option value="long">Long</option>
    </select>

    <!-- API Key -->
    <div class="api-header">

        <label for="apiKey">Gemini API Key</label>

        <a
            id="getKey"
            href="https://aistudio.google.com/apikey"
            target="_blank"
        >
            Get API Key
        </a>

    </div>

    <div class="password-container">

        <input
            id="apiKey"
            type="password"
            placeholder="Paste your Gemini API Key"
            autocomplete="off"
        >

        <button
            id="togglePassword"
            class="icon-btn"
            type="button"
            aria-label="Show API Key"
        >

            <!-- Eye Open -->
            <svg id="eyeOpen"
                 xmlns="http://www.w3.org/2000/svg"
                 width="18"
                 height="18"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 stroke-linecap="round"
                 stroke-linejoin="round">

                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>

            </svg>

            <!-- Eye Closed -->
            <svg id="eyeClosed"
                 xmlns="http://www.w3.org/2000/svg"
                 width="18"
                 height="18"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 stroke-linecap="round"
                 stroke-linejoin="round"
                 style="display:none;">

                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C7 20 2.73 16.89 1 12a21.86 21.86 0 0 1 5.06-7.94"/>
                <path d="M1 1l22 22"/>
                <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c5 0 9.27 3.11 11 8a21.77 21.77 0 0 1-3.16 5.19"/>
                <path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/>

            </svg>

        </button>

    </div>

   <button id="saveKey">

    <svg xmlns="http://www.w3.org/2000/svg"
    width="18"
    height="18"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2">
    
    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
    
    <polyline points="17 21 17 13 7 13 7 21"/>
    
    <polyline points="7 3 7 8 15 8"/>
    
    </svg>
    
    <span>Save API Key</span>
    
    </button>

    <!-- Additional Instructions -->
    <label for="instruction">Additional Instructions</label>

    <textarea
        id="instruction"
        placeholder="Anything you'd like AI to keep in mind?"
    ></textarea>

    <!-- Generate -->
    <button id="generateBtn">

<svg xmlns="http://www.w3.org/2000/svg"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<path d="M5 12h14"/>

<path d="M13 5l7 7-7 7"/>

</svg>

<span>Generate Reply</span>

</button>

    <div class="divider"></div>

    <!-- Generated Reply -->
    <div class="replyHeader">

        <h2>Generated Reply</h2>

        <button id="copyBtn">

                <svg xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2">

                <rect x="9" y="9" width="13" height="13" rx="2"/>

                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>

                </svg>

                <span>Copy</span>

                </button>

    </div>

    <textarea
        id="reply"
        readonly
        placeholder="Your AI generated reply appears here..."
    ></textarea>

</div>

<div id="toast" class="toast">
    <span id="toastMessage">Success</span>
</div>

<script src="popup.js"></script>

</body>
</html>
